<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Sensi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            color: #6366f1;
            margin-bottom: 10px;
        }
        p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #334155;
            border-radius: 6px;
            background-color: #0f172a;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #6366f1;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #4f46e5;
        }
        .message {
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            color: #6366f1;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Recuperar Acesso 🔑</h2>
    <p>Digite o e-mail que você usou na compra para recuperar sua senha.</p>
    
    <input type="email" id="emailInput" placeholder="Seu e-mail de compra..." required>
    <button onclick="recuperarSenha()">Buscar Senha</button>
    
    <div id="msgOutput" class="message"></div>
    
    <a href="index.html" class="back-link">← Voltar para o Login</a>
</div>

<script>
async function recuperarSenha() {
    const emailDigitado = document.getElementById('emailInput').value.trim().toLowerCase();
    const msgOutput = document.getElementById('msgOutput');
    
    if (!emailDigitado) {
        msgOutput.style.color = '#ef4444';
        msgOutput.innerText = 'Por favor, digite o seu e-mail.';
        return;
    }

    msgOutput.style.color = '#e2e8f0';
    msgOutput.innerText = 'Buscando no sistema...';

    // URL do seu banco de dados Firebase (substitua pelo seu link real)
    const firebaseURL = 'https://dockaze-apks-default-rtdb.firebaseio.com/usuarios_liberados.json';

    try {
        const response = await fetch(firebaseURL);
        const usuarios = await response.json();
        
        let senhaEncontrada = null;

        // Procura o e-mail dentro da lista de usuários salvos
        if (usuarios) {
            for (let chave in usuarios) {
                if (usuarios[chave].email && usuarios[chave].email.toLowerCase() === emailDigitado) {
                    senhaEncontrada = usuarios[chave].senha;
                    break;
                }
            }
        }

        if (senhaEncontrada) {
            msgOutput.style.color = '#22c55e';
            msgOutput.innerHTML = `Sua senha é: <strong style="font-size: 18px; background: #0f172a; padding: 2px 8px; border-radius: 4px;">${senhaEncontrada}</strong><br><span style="font-size: 12px; color: #94a3b8;">Guarde-a com segurança!</span>`;
        } else {
            msgOutput.style.color = '#ef4444';
            msgOutput.innerText = 'E-mail não encontrado. Verifique se digitou corretamente ou se a compra foi aprovada.';
        }

    } catch (error) {
        console.error(error);
        msgOutput.style.color = '#ef4444';
        msgOutput.innerText = 'Erro ao conectar ao servidor. Tente novamente mais tarde.';
    }
}
</script>

</body>
</html>
