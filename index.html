<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GERADOR DE SENSI · DOCKAZE</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0b0b;
      font-family: Arial, sans-serif;
      color: #fff;
      padding: 20px;
      min-height: 100vh;
    }
    .container { max-width: 700px; margin: 0 auto; }
    .glass {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,0,50,0.15);
      border-radius: 32px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .neon-border { border: 1px solid #ff003366; box-shadow: 0 0 20px #ff003344; }
    .text-center { text-align: center; }
    .neon-pulse {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff0033, #ff4400, #cc0033);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px #ff003388;
      animation: pulseGlow 2s infinite alternate;
    }
    @keyframes pulseGlow {
      0% { text-shadow: 0 0 20px #ff003366; }
      100% { text-shadow: 0 0 60px #ff0033cc; }
    }
    .dpi-input {
      width: 100%;
      padding: 1rem;
      border-radius: 60px;
      border: 1px solid #ff003355;
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 1.2rem;
      text-align: center;
      outline: none;
    }
    .dpi-input:focus { border-color: #ff4400; box-shadow: 0 0 30px #ff440044; }
    .btn-primary {
      padding: 0.9rem 2.8rem;
      border: none;
      border-radius: 60px;
      background: linear-gradient(135deg, #ff0033, #cc0022);
      color: #fff;
      font-weight: 700;
      font-size: 1.2rem;
      box-shadow: 0 0 30px #ff003366;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 1.5rem;
    }
    .btn-primary:hover { transform: scale(1.04); box-shadow: 0 0 50px #ff0033aa; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .results-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      margin: 1.5rem 0;
    }
    .res-item {
      background: rgba(255,255,255,0.02);
      padding: 0.8rem;
      border-radius: 16px;
      border: 1px solid #ff003344;
      text-align: center;
    }
    .res-item .label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; }
    .res-item .value { font-size: 1.8rem; font-weight: 700; color: #ff4400; }
    .copy-btn {
      padding: 0.5rem 2rem;
      border: 1px solid #ff4400;
      border-radius: 40px;
      background: transparent;
      color: #ff4400;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    .copy-btn:hover { background: #ff440022; box-shadow: 0 0 30px #ff440044; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .stat-card {
      padding: 1rem;
      text-align: center;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid #ff003322;
    }
    .stat-card .num { font-size: 1.8rem; font-weight: 700; color: #ff0033; }
    .stat-card .label { font-size: 0.8rem; color: #aaa; }
    .review-form input, .review-form textarea, .review-form select {
      width: 100%;
      margin: 0.3rem 0;
      padding: 0.7rem;
      border-radius: 16px;
      border: 1px solid #ff003344;
      background: #1a1a1a;
      color: #fff;
    }
    .review-form input::placeholder, .review-form textarea::placeholder { color: #666; }
    .review-form .row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .review-form .row select { width: auto; flex: 1; }
    .review-list { max-height: 300px; overflow-y: auto; margin-top: 1rem; }
    .review-item {
      background: rgba(255,255,255,0.03);
      padding: 0.8rem;
      border-radius: 12px;
      margin-bottom: 0.5rem;
      border-left: 3px solid #ff4400;
    }
    .review-item .stars { color: #ffd700; }
    .review-item .date { font-size: 0.7rem; color: #888; }
    .review-item .name { font-weight: 700; }
    .sensi-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin: 1rem 0;
    }
    .sensi-details .detail-item {
      display: flex;
      justify-content: space-between;
      padding: 0.3rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .sensi-details .detail-item .label { color: #aaa; }
    .sensi-details .detail-item .value { color: #ff4400; font-weight: 600; }
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      backdrop-filter: blur(12px);
      padding: 0.8rem 2rem;
      border-radius: 60px;
      border: 1px solid #ff0033;
      box-shadow: 0 0 40px #ff003344;
      font-weight: 600;
      opacity: 0;
      transition: 0.4s;
      z-index: 999;
    }
    #toast.show { opacity: 1; bottom: 50px; }
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer { text-align: center; padding: 1.5rem 0; border-top: 1px solid #ff003344; margin-top: 2rem; }
    .dockaze {
      font-weight: 800;
      font-size: 1.4rem;
      background: linear-gradient(135deg, #ff0033, #ff4400);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status-badge {
      display: inline-block;
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-size: 0.8rem;
      margin-top: 0.5rem;
    }
    .status-online { background: #00ff8822; color: #00ff88; border: 1px solid #00ff8855; }
    .status-offline { background: #ff880022; color: #ff8800; border: 1px solid #ff880055; }
    .status-error { background: #ff003322; color: #ff0033; border: 1px solid #ff003355; }
    .debug-box {
      background: #1a1a1a;
      padding: 0.8rem;
      border-radius: 12px;
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: #888;
      max-height: 100px;
      overflow-y: auto;
      font-family: monospace;
      border: 1px solid #333;
    }
    @media (max-width: 640px) {
      .neon-pulse { font-size: 2rem; }
      .results-grid { grid-template-columns: repeat(2, 1fr); }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .sensi-details { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="toast">✨ Sensibilidade copiada!</div>

  <div class="container">
    <div class="text-center glass neon-border" style="padding: 1.5rem;">
      <div class="neon-pulse">GERADOR DE SENSI</div>
      <div style="margin-top: 0.5rem;">
        <span id="firebaseStatus" class="status-badge status-offline">⏳ Conectando...</span>
      </div>
    </div>

    <div class="glass neon-border">
      <div style="text-align: center;">
        <label style="font-weight: 600; color: #ccc; display: block; margin-bottom: 0.5rem;">
          <i class="fas fa-mouse-pointer" style="color: #ff0033;"></i> Digite seu DPI
        </label>
        <input type="number" id="dpiInput" class="dpi-input" placeholder="100 – 1000" min="100" max="1000" value="400">
        <button class="btn-primary" id="generateBtn">
          <i class="fas fa-random"></i> GERAR SENSIBILIDADE
        </button>
      </div>
      <div id="resultsContainer" style="margin-top: 1.5rem;"></div>
      <div style="text-align: center;">
        <button class="copy-btn" id="copySensiBtn" style="display:none;">
          <i class="fas fa-copy"></i> COPIAR SENSI
        </button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="num" id="totalGen">0</div><div class="label">Gerações</div></div>
      <div class="stat-card"><div class="num" id="totalReviews">0</div><div class="label">Avaliações</div></div>
      <div class="stat-card"><div class="num" id="avgRating">0.0</div><div class="label">Média ★</div></div>
      <div class="stat-card"><div class="num" id="onlineUsers">42</div><div class="label">Online</div></div>
    </div>

    <div class="glass neon-border">
      <h3 style="margin-bottom: 1rem;">
        <i class="fas fa-star" style="color: #ffd700;"></i> Avaliações
        <span id="avgDisplay" style="font-size: 0.9rem; color: #aaa; margin-left: 0.5rem;"></span>
      </h3>
      <div class="review-form">
        <input type="text" id="reviewName" placeholder="Ex: Lucas">
        <textarea id="reviewComment" placeholder="Digite seu comentário..." rows="2"></textarea>
        <div class="row">
          <span>Nota: </span>
          <select id="reviewStars">
            <option value="5">★★★★★</option>
            <option value="4">★★★★</option>
            <option value="3">★★★</option>
            <option value="2">★★</option>
            <option value="1">★</option>
          </select>
          <button class="btn-primary" id="submitReviewBtn" style="padding: 0.5rem 1.5rem; font-size: 0.9rem; margin-top: 0;">
            <i class="fas fa-paper-plane"></i> Enviar
          </button>
        </div>
      </div>
      <div class="review-list" id="reviewList">
        <p style="color: #666; text-align: center; padding: 1rem;">Carregando avaliações...</p>
      </div>
      <!-- DEBUG -->
      <div class="debug-box" id="debugBox">
        📡 Aguardando ações...
      </div>
    </div>

    <footer>
      <div style="height: 2px; width: 60%; margin: 0 auto 1rem; background: linear-gradient(90deg, transparent, #ff0033, transparent);"></div>
      <p style="color: #888; font-size: 0.9rem;">© 2026 Todos os direitos reservados.</p>
      <div style="margin-top: 0.3rem;">
        <span style="color: #888;">Desenvolvido por </span>
        <span class="dockaze">DOCKAZE <i class="fas fa-check-circle" style="color: #ff0033; -webkit-text-fill-color: #ff0033;"></i></span>
      </div>
    </footer>
  </div>

  <script>
    // ============================================================
    //  FIREBASE CONFIG
    // ============================================================
    const firebaseConfig = {
      apiKey: "AIzaSyABFTZwRSKtSB2uTvNMk_rzE88CVOCqztI",
      authDomain: "gerador-de-sensi-c8ba0.firebaseapp.com",
      databaseURL: "https://gerador-de-sensi-c8ba0-default-rtdb.firebaseio.com",
      projectId: "gerador-de-sensi-c8ba0",
      storageBucket: "gerador-de-sensi-c8ba0.firebasestorage.app",
      messagingSenderId: "966299667014",
      appId: "1:966299667014:web:d3db675867f88b7bda5847"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // ============================================================
    //  DEBUG
    // ============================================================
    const debugBox = document.getElementById('debugBox');
    
    function addDebug(msg, isError = false) {
      const time = new Date().toLocaleTimeString();
      const prefix = isError ? '❌' : '✅';
      debugBox.innerHTML = `[${time}] ${prefix} ${msg}\n` + debugBox.innerHTML;
      if (debugBox.children.length > 20) {
        debugBox.removeChild(debugBox.lastChild);
      }
      console.log(`[${time}] ${prefix} ${msg}`);
    }

    // ============================================================
    //  VARIÁVEIS
    // ============================================================
    let totalGen = parseInt(localStorage.getItem('totalGen')) || 0;
    let currentSensi = null;
    let isSubmitting = false;
    let reviewsCache = [];
    let isFirebaseConnected = false;

    // ============================================================
    //  DOM
    // ============================================================
    const dpiInput = document.getElementById('dpiInput');
    const generateBtn = document.getElementById('generateBtn');
    const resultsContainer = document.getElementById('resultsContainer');
    const copyBtn = document.getElementById('copySensiBtn');
    const totalGenEl = document.getElementById('totalGen');
    const totalReviewsEl = document.getElementById('totalReviews');
    const avgRatingEl = document.getElementById('avgRating');
    const reviewList = document.getElementById('reviewList');
    const submitReviewBtn = document.getElementById('submitReviewBtn');
    const avgDisplay = document.getElementById('avgDisplay');
    const toast = document.getElementById('toast');
    const firebaseStatus = document.getElementById('firebaseStatus');

    // ============================================================
    //  TOAST
    // ============================================================
    function showToast(msg, isError = false) {
      toast.textContent = msg;
      toast.style.borderColor = isError ? '#ff0033' : '#ff4400';
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ============================================================
    //  ALGORITMO - 10 CONFIGURAÇÕES
    // ============================================================
    function generateSensiConfigs(dpi) {
      const base = Math.round(dpi / 4.2);
      const configs = [];

      const variations = [
        { g: 28, rd: 12, m2: -4, m4: -12, aw: -30, oh: 38, bt: 45, cs: 50, sg: 60, mt: 55 },
        { g: 24, rd: 16, m2: -2, m4: -10, aw: -26, oh: 34, bt: 50, cs: 45, sg: 55, mt: 50 },
        { g: 32, rd: 8, m2: -6, m4: -16, aw: -34, oh: 42, bt: 40, cs: 55, sg: 65, mt: 60 },
        { g: 26, rd: 14, m2: -3, m4: -12, aw: -28, oh: 36, bt: 48, cs: 48, sg: 58, mt: 52 },
        { g: 36, rd: 6, m2: -8, m4: -18, aw: -38, oh: 46, bt: 42, cs: 52, sg: 68, mt: 62 },
        { g: 20, rd: 18, m2: 0, m4: -8, aw: -22, oh: 30, bt: 55, cs: 42, sg: 50, mt: 45 },
        { g: 38, rd: 4, m2: -10, m4: -22, aw: -40, oh: 48, bt: 38, cs: 58, sg: 70, mt: 65 },
        { g: 22, rd: 15, m2: -1, m4: -10, aw: -24, oh: 32, bt: 52, cs: 44, sg: 53, mt: 48 },
        { g: 30, rd: 10, m2: -5, m4: -15, aw: -32, oh: 40, bt: 46, cs: 51, sg: 62, mt: 57 },
        { g: 34, rd: 7, m2: -7, m4: -17, aw: -36, oh: 44, bt: 43, cs: 54, sg: 66, mt: 61 }
      ];

      const factor = dpi / 400;

      variations.forEach((v, i) => {
        configs.push({
          id: i + 1,
          geral: Math.min(200, Math.max(0, Math.round(base + v.g))),
          redDot: Math.min(200, Math.max(0, Math.round(base + v.rd))),
          mira2x: Math.min(200, Math.max(0, Math.round(base + v.m2))),
          mira4x: Math.min(200, Math.max(0, Math.round(base + v.m4))),
          awm: Math.min(200, Math.max(0, Math.round(base + v.aw))),
          olhadinha: Math.min(200, Math.max(0, Math.round(base + v.oh))),
          tamanhoBotao: Math.min(100, Math.max(20, Math.round(v.bt * factor))),
          velocidadeCursor: Math.min(100, Math.max(20, Math.round(v.cs * factor))),
          sensiGeral: Math.min(100, Math.max(20, Math.round(v.sg * factor))),
          miraTele: Math.min(100, Math.max(20, Math.round(v.mt * factor)))
        });
      });

      return configs;
    }

    function getRandomConfig(configs) {
      return configs[Math.floor(Math.random() * configs.length)];
    }

    function renderResult(sensi) {
      currentSensi = sensi;

      const html = `
        <div class="results-grid">
          <div class="res-item"><div class="label">Geral</div><div class="value">${sensi.geral}</div></div>
          <div class="res-item"><div class="label">Red Dot</div><div class="value">${sensi.redDot}</div></div>
          <div class="res-item"><div class="label">2x</div><div class="value">${sensi.mira2x}</div></div>
          <div class="res-item"><div class="label">4x</div><div class="value">${sensi.mira4x}</div></div>
          <div class="res-item"><div class="label">AWM</div><div class="value">${sensi.awm}</div></div>
          <div class="res-item"><div class="label">Olhadinha</div><div class="value">${sensi.olhadinha}</div></div>
        </div>
        <div class="sensi-details">
          <div class="detail-item"><span class="label">Tamanho do Botão</span><span class="value">${sensi.tamanhoBotao}%</span></div>
          <div class="detail-item"><span class="label">Velocidade do Cursor</span><span class="value">${sensi.velocidadeCursor}%</span></div>
          <div class="detail-item"><span class="label">Sensibilidade Geral</span><span class="value">${sensi.sensiGeral}%</span></div>
          <div class="detail-item"><span class="label">Mira Telescópica</span><span class="value">${sensi.miraTele}%</span></div>
        </div>
      `;

      resultsContainer.innerHTML = html;
      copyBtn.style.display = 'inline-block';
    }

    // ============================================================
    //  GERAR SENSI
    // ============================================================
    generateBtn.addEventListener('click', function() {
      const dpi = parseInt(dpiInput.value);

      if (isNaN(dpi) || dpi < 100 || dpi > 1000) {
        showToast('⚠️ DPI inválido! Use 100-1000', true);
        return;
      }

      const configs = generateSensiConfigs(dpi);
      const selected = getRandomConfig(configs);
      renderResult(selected);

      totalGen++;
      localStorage.setItem('totalGen', totalGen);
      totalGenEl.textContent = totalGen;

      showToast('✅ Sensibilidade gerada!');
      addDebug(`DPI ${dpi} - Config ${selected.id} gerada`);
    });

    // ============================================================
    //  COPIAR
    // ============================================================
    copyBtn.addEventListener('click', () => {
      if (!currentSensi) {
        showToast('⚠️ Nenhuma sensibilidade para copiar', true);
        return;
      }

      const txt = 
        `🎯 SENSI GERADA\n` +
        `═══════════════════════════\n` +
        `Geral: ${currentSensi.geral}\n` +
        `Red Dot: ${currentSensi.redDot}\n` +
        `2x: ${currentSensi.mira2x}\n` +
        `4x: ${currentSensi.mira4x}\n` +
        `AWM: ${currentSensi.awm}\n` +
        `Olhadinha: ${currentSensi.olhadinha}\n` +
        `\n📊 CONFIGURAÇÕES EXTRAS:\n` +
        `Tamanho do Botão: ${currentSensi.tamanhoBotao}%\n` +
        `Velocidade do Cursor: ${currentSensi.velocidadeCursor}%\n` +
        `Sensibilidade Geral: ${currentSensi.sensiGeral}%\n` +
        `Mira Telescópica: ${currentSensi.miraTele}%`;

      navigator.clipboard.writeText(txt)
        .then(() => showToast('📋 Sensibilidade copiada!'))
        .catch(() => {
          const ta = document.createElement('textarea');
          ta.value = txt;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
          showToast('📋 Sensibilidade copiada!');
        });
      addDebug('Sensibilidade copiada');
    });

    // ============================================================
    //  FIREBASE - AUTENTICAÇÃO
    // ============================================================
    addDebug('🔄 Iniciando autenticação...');

    auth.signInAnonymously()
      .then(() => {
        isFirebaseConnected = true;
        firebaseStatus.className = 'status-badge status-online';
        firebaseStatus.innerHTML = '✅ Firebase Online';
        addDebug('✅ Autenticado com sucesso!');
        loadReviews();
      })
      .catch(err => {
        isFirebaseConnected = false;
        firebaseStatus.className = 'status-badge status-error';
        firebaseStatus.innerHTML = '⚠️ Firebase Offline';
        addDebug(`❌ Erro na autenticação: ${err.message}`, true);
        loadReviewsFallback();
      });

    // ============================================================
    //  FIREBASE - REVIEWS
    // ============================================================
    async function loadReviews() {
      try {
        addDebug('📥 Carregando avaliações...');
        const snapshot = await db.collection('reviews')
          .orderBy('timestamp', 'desc')
          .get();

        reviewsCache = [];
        snapshot.forEach(doc => {
          reviewsCache.push({ id: doc.id, ...doc.data() });
        });

        renderReviews();
        updateStats();
        addDebug(`✅ ${reviewsCache.length} avaliações carregadas`);
      } catch (e) {
        addDebug(`❌ Erro ao carregar: ${e.message}`, true);
        loadReviewsFallback();
      }
    }

    function loadReviewsFallback() {
      addDebug('📥 Usando dados locais (fallback)');
      const localReviews = JSON.parse(localStorage.getItem('reviews_fallback')) || [];
      reviewsCache = localReviews;
      renderReviews();
      updateStats();
      if (localReviews.length > 0) {
        addDebug(`📦 ${localReviews.length} avaliações locais carregadas`);
      }
    }

    function renderReviews() {
      if (!reviewsCache || reviewsCache.length === 0) {
        reviewList.innerHTML = '<p style="color:#666;text-align:center;padding:1rem;">Nenhuma avaliação ainda. Seja o primeiro!</p>';
        return;
      }

      let html = '';
      reviewsCache.forEach(r => {
        const stars = '★'.repeat(Math.min(5, Math.max(0, r.stars || 0))) + '☆'.repeat(5 - Math.min(5, Math.max(0, r.stars || 0)));
        html += `
          <div class="review-item">
            <div>
              <span class="name">${r.name || 'Anônimo'}</span>
              <span class="stars">${stars}</span>
            </div>
            <div style="margin:4px 0;">${r.comment || 'Sem comentário'}</div>
            <div class="date">${r.date ? new Date(r.date).toLocaleString('pt-BR') : ''}</div>
          </div>
        `;
      });
      reviewList.innerHTML = html;
    }

    function updateStats() {
      const total = reviewsCache.length;
      totalReviewsEl.textContent = total;

      if (total === 0) {
        avgRatingEl.textContent = '0.0';
        avgDisplay.textContent = '★ 0.0 (0 avaliações)';
        return;
      }

      const sum = reviewsCache.reduce((a, b) => a + (b.stars || 0), 0);
      const avg = sum / total;
      avgRatingEl.textContent = avg.toFixed(1);
      avgDisplay.textContent = `★ ${avg.toFixed(1)} (${total} avaliações)`;
    }

    // ============================================================
    //  ENVIAR AVALIAÇÃO - COM DEBUG DETALHADO
    // ============================================================
    submitReviewBtn.addEventListener('click', async function(e) {
      e.preventDefault();

      if (isSubmitting) {
        addDebug('⏳ Aguarde, já está enviando...');
        return;
      }

      const name = document.getElementById('reviewName').value.trim() || 'Anônimo';
      const comment = document.getElementById('reviewComment').value.trim() || 'Sem comentário';
      const stars = parseInt(document.getElementById('reviewStars').value);

      addDebug(`📝 Preparando avaliação: ${name} - ${stars}★`);

      if (stars < 1 || stars > 5) {
        showToast('⚠️ Selecione uma nota válida', true);
        addDebug('❌ Nota inválida', true);
        return;
      }

      isSubmitting = true;
      const originalText = this.innerHTML;
      this.innerHTML = '<span class="loading-spinner"></span> Enviando...';
      this.disabled = true;

      try {
        addDebug(`📤 Enviando para Firebase...`);

        // TENTAR SALVAR NO FIREBASE
        const docRef = await db.collection('reviews').add({
          name,
          comment,
          stars,
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          date: new Date().toISOString()
        });

        addDebug(`✅ Avaliação salva no Firebase! ID: ${docRef.id}`);
        showToast('⭐ Avaliação enviada com sucesso!');
        
        document.getElementById('reviewComment').value = '';
        document.getElementById('reviewName').value = '';
        
        await loadReviews();

        // Confetti
        for (let i = 0; i < 30; i++) {
          setTimeout(() => {
            const c = document.createElement('div');
            const colors = ['#ff0033', '#ffd700', '#ff4400', '#ff6b6b'];
            c.style.cssText = `
              position: fixed;
              width: ${6 + Math.random() * 8}px;
              height: ${6 + Math.random() * 8}px;
              background: ${colors[Math.floor(Math.random() * colors.length)]};
              border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
              left: ${Math.random() * 100}vw;
              top: -10px;
              pointer-events: none;
              z-index: 9999;
              animation: fall ${1 + Math.random() * 2}s linear forwards;
            `;
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 3000);
          }, i * 50);
        }

      } catch (error) {
        addDebug(`❌ Erro no Firebase: ${error.message}`, true);
        console.error('Erro detalhado:', error);
        
        // FALLBACK: SALVAR LOCALMENTE
        try {
          addDebug('📦 Salvando localmente (fallback)...');
          const fallback = JSON.parse(localStorage.getItem('reviews_fallback')) || [];
          fallback.push({
            name,
            comment,
            stars,
            date: new Date().toISOString()
          });
          localStorage.setItem('reviews_fallback', JSON.stringify(fallback));
          reviewsCache = fallback;
          renderReviews();
          updateStats();
          showToast('⭐ Avaliação salva localmente!');
          document.getElementById('reviewComment').value = '';
          document.getElementById('reviewName').value = '';
          addDebug(`✅ Avaliação salva localmente! Total: ${fallback.length}`);
        } catch (fallbackError) {
          addDebug(`❌ Erro no fallback: ${fallbackError.message}`, true);
          showToast('❌ Erro ao salvar avaliação', true);
        }
      } finally {
        this.innerHTML = originalText;
        this.disabled = false;
        isSubmitting = false;
        addDebug('🔄 Estado do botão restaurado');
      }
    });

    // ============================================================
    //  INICIALIZAÇÃO
    // ============================================================
    totalGenEl.textContent = totalGen;
    addDebug(`📊 Total de gerações: ${totalGen}`);

    setInterval(() => {
      document.getElementById('onlineUsers').textContent = Math.floor(20 + Math.random() * 50);
    }, 5000);

    // Estilo confetti
    const styleSheet = document.createElement('style');
    styleSheet.textContent = `
      @keyframes fall {
        0% { transform: translateY(0) rotate(0deg); opacity: 1; }
        100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
      }
    `;
    document.head.appendChild(styleSheet);

    console.log('🚀 GERADOR DE SENSI carregado!');
    addDebug('🚀 Sistema inicializado');
  </script>
</body>
</html>
